<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CDN/WAF Detector — Side Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body class="sidepanel-mode">
<div class="app">

  <header class="app-header">
    <div class="header-left">
      <svg class="logo-mark" width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="9" cy="9" r="4" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
        <line x1="9" y1="1" x2="9" y2="4" stroke="currentColor" stroke-width="1.5"/>
        <line x1="9" y1="14" x2="9" y2="17" stroke="currentColor" stroke-width="1.5"/>
        <line x1="1" y1="9" x2="4" y2="9" stroke="currentColor" stroke-width="1.5"/>
        <line x1="14" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <h1 data-i18n="appTitle">CDN / WAF Detector</h1>
    </div>
    <div class="header-right">
      <button id="themeToggle" class="btn-icon" type="button" title="Toggle dark/light" aria-label="Toggle theme" data-i18n-title="btnTheme">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="3.2" stroke="currentColor" stroke-width="1.3"/>
          <path d="M7 0.8V2.3M7 11.7V13.2M13.2 7H11.7M2.3 7H0.8M11.3 2.7L10.2 3.8M3.8 10.2L2.7 11.3M11.3 11.3L10.2 10.2M3.8 3.8L2.7 2.7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="version-tag">v9.1</span>
    </div>
  </header>

  <section class="input-section">
    <div class="input-row">
      <div class="input-wrap">
        <span class="input-prefix" aria-hidden="true">⌕</span>
        <input id="domain" type="text" placeholder="example.com or 1.2.3.4" data-i18n-placeholder="domainPlaceholder" autocomplete="off" spellcheck="false">
      </div>
      <button id="scan" type="button" data-i18n="btnScan">Scan</button>
      <button id="rescan" class="btn-icon" type="button" title="Force re-scan (bypass cache)" aria-label="Force re-scan" data-i18n-title="btnRescan">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M13 2.5A6.5 6.5 0 1 0 13 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M10 1L13 2.5L11 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="pinBtn" class="btn-icon" type="button" title="Pin this domain" aria-label="Pin domain" data-i18n-title="btnPin">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 1L8.3 4.7L12 5L9.3 7.6L10 11.5L7 9.5L4 11.5L4.7 7.6L2 5L5.7 4.7L7 1Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="history" class="btn-icon" type="button" title="Scan history" aria-label="Scan history" data-i18n-title="btnHistory">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 4V7L9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="input-row-2">
      <button id="pinsViewBtn" class="link-btn" type="button" data-i18n="btnPinned">★ Pinned</button>
      <button id="batchBtn" class="link-btn" type="button" data-i18n="btnBatch">⊞ Batch scan</button>
      <button id="compareBtn" class="link-btn" type="button" data-i18n="btnCompare">⇄ Compare 2</button>
      <button id="settingsBtn" class="link-btn" type="button" data-i18n="btnSettings">⚙ Settings</button>
      <button id="watchlistBtn" class="link-btn" type="button" data-i18n="watchlistTitle">Watchlist</button>
      <button id="sidePanelBtn" class="link-btn" type="button" data-i18n="sidePanelOpen">Open as side panel</button>
    </div>
  </section>

  <div id="status-bar" class="status-bar">
    <span id="status-text" class="status-idle" data-i18n="statusReady">Ready — enter a domain above</span>
    <span id="cached-badge" class="cached-badge" hidden>cached</span>
  </div>

  <div id="progress" hidden>
    <div class="progress-track">
      <div id="pbar" class="progress-fill"></div>
    </div>
    <div class="progress-meta">
      <span id="pct" class="pct-text">0%</span>
      <span id="activity" class="activity-text">Starting…</span>
    </div>
  </div>

  <section id="results"></section>

</div>
<script src="popup.js"></script>
</body>
</html>
